<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SmartStock AI</title>
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #eef2ff 0%, #f5f3ff 100%);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .chat-box {
            width: 480px;
            max-width: 100%;
            margin-top: 40px;
            background: white;
            padding: 24px;
            border-radius: 14px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
        }

        h3 {
            margin: 0 0 14px 0;
            color: #1f2937;
        }

        .mode-row {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
        }

        .mode-btn {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #d1d5db;
            background: #f9fafb;
            color: #374151;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.15s ease;
        }

        .mode-btn:hover { background: #f3f4f6; }

        .mode-btn.active {
            background: #4f46e5;
            color: white;
            border-color: #4f46e5;
        }

        #messages {
            height: 360px;
            overflow-y: auto;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            background: #fafafa;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .bubble {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 12px;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.4;
            font-size: 14px;
        }

        .user {
            align-self: flex-end;
            background: #4f46e5;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bot {
            align-self: flex-start;
            background: white;
            color: #111827;
            border: 1px solid #e5e7eb;
            border-bottom-left-radius: 4px;
        }

        .bot.loading { color: #6b7280; font-style: italic; }
        .bot.error { color: #b91c1c; border-color: #fecaca; background: #fef2f2; }

        .input-row {
            display: flex;
            gap: 8px;
        }

        #input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        #input:focus { border-color: #4f46e5; }

        #send-btn {
            padding: 10px 18px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        #send-btn:hover:not(:disabled) { background: #4338ca; }
        #send-btn:disabled { background: #9ca3af; cursor: not-allowed; }
    </style>
</head>

<body>

<div class="chat-box">
    <h3>SmartStock AI Chat</h3>

    <div class="mode-row">
        <button class="mode-btn active" data-mode="classic">Klasik (/chat)</button>
        <button class="mode-btn" data-mode="ai">AI (/ai-chat)</button>
    </div>

    <div id="messages"></div>

    <div class="input-row">
        <input id="input" placeholder="Mesaj yaz..." autocomplete="off">
        <button id="send-btn" onclick="send()">Gönder</button>
    </div>
</div>

<script>
const API_BASE = "http://127.0.0.1:8000";
let currentMode = "classic";

document.querySelectorAll(".mode-btn").forEach(btn => {
    btn.addEventListener("click", () => {
        document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentMode = btn.dataset.mode;
    });
});

document.getElementById("input").addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
    }
});

function appendBubble(text, cssClass) {
    const messages = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = "bubble " + cssClass;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
}

async function callBackend(message) {
    if (currentMode === "ai") {
        const res = await fetch(API_BASE + "/ai-chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message })
        });
        if (!res.ok) throw new Error(await res.text());
        return (await res.json()).answer;
    }
    const res = await fetch(API_BASE + "/chat?message=" + encodeURIComponent(message));
    if (!res.ok) throw new Error(await res.text());
    return (await res.json()).answer;
}

async function send() {
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send-btn");
    const message = input.value.trim();
    if (!message) return;

    appendBubble(message, "user");
    input.value = "";
    sendBtn.disabled = true;

    const loadingBubble = appendBubble("Yazıyor…", "bot loading");

    try {
        const answer = await callBackend(message);
        loadingBubble.remove();
        appendBubble(answer, "bot");
    } catch (err) {
        loadingBubble.remove();
        appendBubble("Hata: " + err.message, "bot error");
    } finally {
        sendBtn.disabled = false;
        input.focus();
    }
}
</script>

</body>
</html>
