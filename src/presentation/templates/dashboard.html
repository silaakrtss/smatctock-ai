{% extends "base.html" %}
{% set active = 'dashboard' %}
{% block title %}Operasyon Paneli · Kooperatif Ajanı{% endblock %}

{% block main %}
<section class="space-y-6"
         x-data="notificationStream()"
         x-init="start()"
         @beforeunload.window="stop()">

  <div class="grid lg:grid-cols-3 gap-6">

    <div class="lg:col-span-2 grid md:grid-cols-2 gap-6">

      <article class="bg-white border border-harvest-100 rounded-2xl shadow-sm p-6"
               x-data="productList()" x-init="load()">
        <h2 class="font-display text-lg text-harvest-700 mb-3">Ürünler</h2>

        <p class="text-sm text-harvest-500 italic" x-show="loading">Yükleniyor…</p>
        <p class="text-sm text-ember-600" x-show="error" x-text="error"></p>

        <ul class="divide-y divide-harvest-100" x-show="!loading && !error">
          <template x-for="p in products" :key="p.id">
            <li class="py-2 flex justify-between text-sm">
              <span class="text-harvest-700" x-text="p.name"></span>
              <span class="font-medium" x-text="p.stock"></span>
            </li>
          </template>
          <template x-if="!loading && !error && products.length === 0">
            <li class="py-2 text-sm text-harvest-500 italic">Ürün yok.</li>
          </template>
        </ul>
      </article>

      <article class="bg-white border border-harvest-100 rounded-2xl shadow-sm p-6"
               x-data="orderList()" x-init="load()">
        <h2 class="font-display text-lg text-harvest-700 mb-3">Siparişler</h2>

        <p class="text-sm text-harvest-500 italic" x-show="loading">Yükleniyor…</p>
        <p class="text-sm text-ember-600" x-show="error" x-text="error"></p>

        <ul class="divide-y divide-harvest-100" x-show="!loading && !error">
          <template x-for="o in orders" :key="o.id">
            <li class="py-2 flex justify-between items-center text-sm">
              <span class="text-harvest-700">
                <span class="text-harvest-500">#</span><span x-text="o.id"></span>
                · <span x-text="o.customer_name"></span>
              </span>
              <span class="text-xs px-2 py-0.5 rounded-full bg-harvest-50 text-harvest-700"
                    x-text="statusLabel(o.status)"></span>
            </li>
          </template>
          <template x-if="!loading && !error && orders.length === 0">
            <li class="py-2 text-sm text-harvest-500 italic">Sipariş yok.</li>
          </template>
        </ul>
      </article>
    </div>

    <aside class="bg-white border border-harvest-100 rounded-2xl shadow-sm p-6">
      <h2 class="font-display text-lg text-harvest-700 mb-3">🔔 Canlı Bildirimler</h2>
      <p class="text-xs mb-3" :class="connected ? 'text-harvest-500' : 'text-ember-600'">
        <span x-text="connected ? 'SSE bağlantısı açık.' : 'Bağlantı kuruluyor…'"></span>
      </p>

      <div class="space-y-1">
        <template x-for="n in notifications" :key="n.id">
          <div class="notification-card" :data-status="n.status">
            <div class="font-semibold text-harvest-700" x-text="n.subject"></div>
            <div class="text-sm text-harvest-600" x-text="n.body"></div>
            <div class="text-xs text-harvest-500 mt-1" x-text="n.channel + ' · ' + n.recipient"></div>
          </div>
        </template>
        <template x-if="notifications.length === 0">
          <p class="text-sm text-harvest-500 italic">Henüz bildirim yok.</p>
        </template>
      </div>
    </aside>
  </div>

</section>

<script>
  const ORDER_STATUS_LABELS = {
    preparing: "Hazırlanıyor",
    in_shipping: "Kargoda",
    delivered: "Teslim edildi",
    cancelled: "İptal",
  };

  function productList() {
    return {
      products: [],
      loading: true,
      error: "",
      async load() {
        try {
          const res = await fetch("/products");
          if (!res.ok) throw new Error("HTTP " + res.status);
          this.products = await res.json();
        } catch (err) {
          this.error = "Ürünler yüklenemedi.";
        } finally {
          this.loading = false;
        }
      },
    };
  }

  function orderList() {
    return {
      orders: [],
      loading: true,
      error: "",
      statusLabel(value) {
        return ORDER_STATUS_LABELS[value] || value;
      },
      async load() {
        try {
          const res = await fetch("/orders");
          if (!res.ok) throw new Error("HTTP " + res.status);
          this.orders = await res.json();
        } catch (err) {
          this.error = "Siparişler yüklenemedi.";
        } finally {
          this.loading = false;
        }
      },
    };
  }

  function notificationStream() {
    return {
      notifications: [],
      connected: false,
      source: null,

      async start() {
        try {
          const res = await fetch("/notifications");
          if (res.ok) this.notifications = await res.json();
        } catch (err) { /* sessiz */ }

        this.openSource();

        document.addEventListener("visibilitychange", this._onVisibility = () => {
          if (document.visibilityState === "hidden") {
            this.stop();
          } else if (!this.source) {
            this.openSource();
          }
        });
      },

      openSource() {
        if (this.source) return;
        const src = new EventSource("/notifications/stream");
        this.connected = true;
        src.onmessage = (e) => {
          try {
            const payload = JSON.parse(e.data);
            if (payload.type && payload.type !== "notification") return;
            this.notifications.unshift(payload);
            if (this.notifications.length > 20) this.notifications.length = 20;
          } catch (err) { /* sessiz */ }
        };
        src.onerror = () => {
          this.connected = false;
          this.stop();
        };
        this.source = src;
      },

      stop() {
        if (this.source) {
          this.source.close();
          this.source = null;
        }
        this.connected = false;
      },

      destroy() {
        this.stop();
        if (this._onVisibility) {
          document.removeEventListener("visibilitychange", this._onVisibility);
        }
      },
    };
  }
</script>
{% endblock %}
